<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Valuta váltó</title>
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">

        <h3 class="mb-4">Valuta váltó</h3>

      
        <div class="mb-3">
            <label class="form-label">Összeg (HUF)</label>
            <input type="number" id="amount" class="form-control" placeholder="Pl: 10000">
        </div>

     
        <div class="mb-3">
            <label class="form-label">Deviza</label>
            <select id="currency" class="form-select">
                <option value="EUR">EUR</option>
                <option value="USD">USD</option>
                <option value="GBP">GBP</option>
            </select>
        </div>

        
        <button class="btn btn-primary w-100" onclick="convertCurrency()">
            Váltás
        </button>

       
        <div class="alert alert-success mt-4" id="result">
            Az eredmény itt jelenik meg
        </div>

    </div>
</div>


<script src="script.js" defe></script>

</body>
</html>
